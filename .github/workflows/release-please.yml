name: release-please

# On every push to master, maintain a standing "Release PR" that accumulates the
# changelog and computes the next semver from Conventional Commits. Merging that
# PR creates the vX.Y.Z tag + GitHub Release, which triggers release.yml.
#
# Uses RELEASE_PLEASE_TOKEN (a PAT) rather than the default GITHUB_TOKEN so the
# tag it pushes actually triggers the downstream release workflow (GitHub
# suppresses workflow triggers for events created by GITHUB_TOKEN).
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
